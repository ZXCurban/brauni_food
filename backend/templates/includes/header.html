{% load static %}
{% with current=request.path %}

<header class="site-header">
    <div class="header-container">

        <nav class="header-nav header-nav-left">
            <a href="{% url 'home' %}" class="nav-pill {% if current == '/' %}nav-pill-active{% endif %}">
                <span>Главная</span>
            </a>

            <a href="{% url 'products' %}" class="nav-pill {% if '/products' in current %}nav-pill-active{% endif %}">
                <span>Продукция</span>
            </a>
        </nav>

        <a href="{% url 'home' %}" class="header-logo">
            <img
                src="{% static 'images/logo/logo_blue.svg' %}"
                alt="Брауни Фуд"
            >
        </a>

        <nav class="header-nav header-nav-right">
            <a href="{% url 'company' %}" class="nav-pill {% if '/company' in current %}nav-pill-active{% endif %}">
                <span>О компании</span>
            </a>

            <a href="{% url 'vacancies' %}" class="nav-pill {% if '/vacancies' in current %}nav-pill-active{% endif %}">
                <span>Вакансии</span>
            </a>
        </nav>

        <button class="mobile-burger" id="mobileBurger" aria-label="Открыть меню" aria-expanded="false">
            <img
                src="{% static 'icons/burger_blue.svg' %}"
                alt="Меню"
            >
        </button>

    </div>

    <div class="header-divider"></div>

    <!-- Mobile Navigation Overlay -->
    <div class="mobile-nav-overlay" id="mobileNavOverlay" aria-hidden="true"></div>

    <nav class="mobile-nav-panel" id="mobileNavPanel" aria-label="Мобильное меню">
        <button class="mobile-nav-close" id="mobileNavClose" aria-label="Закрыть меню">
            <span></span>
            <span></span>
        </button>

        <div class="mobile-nav-links">
            <a href="{% url 'home' %}" class="mobile-nav-link {% if current == '/' %}is-active{% endif %}">
                Главная
            </a>
            <a href="{% url 'products' %}" class="mobile-nav-link {% if '/products' in current %}is-active{% endif %}">
                Продукция
            </a>
            <a href="{% url 'company' %}" class="mobile-nav-link {% if '/company' in current %}is-active{% endif %}">
                О компании
            </a>
            <a href="{% url 'vacancies' %}" class="mobile-nav-link {% if '/vacancies' in current %}is-active{% endif %}">
                Вакансии
            </a>
        </div>
    </nav>
</header>

{% endwith %}
