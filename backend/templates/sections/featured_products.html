<section class="featured-products-section">

    <div class="featured-products-container">

        <!-- TOP -->

        <div class="featured-products-top">

            <div class="featured-products-heading">

                <div class="featured-products-label">
                    Категории
                </div>

                <h2 class="featured-products-title">
                    Наша продукция
                </h2>

            </div>

        </div>


        <!-- CATEGORY CAROUSEL -->

        <div class="featured-products-nav" id="categoryCarousel">

            <div class="featured-products-carousel-viewport">
                <div class="featured-products-carousel-track" id="categoryTabs">

                    {% for category in categories %}
                        <button
                            class="
                                featured-products-nav-item
                                {% if category.id == featured_category.id %}
                                    is-active
                                {% endif %}
                            "
                            type="button"
                            data-category-id="{{ category.id }}"
                        >
                            {{ category.name }}
                        </button>
                    {% endfor %}

                </div>
            </div>

        </div>


        <!-- PRODUCTS CONTAINER (per category) -->

        <div class="featured-products-grids" id="categoryProducts">

            {% for category in categories %}

                <div
                    class="featured-products-grid"
                    data-category-id="{{ category.id }}"
                    {% if category.id != featured_category.id %}
                        style="display: none;"
                    {% endif %}
                >

                    {% for product in category.featured_products %}

                        {% include 'components/product_card.html' with is_featured_card=True %}

                    {% endfor %}

                </div>

            {% endfor %}

        </div>

    </div>

</section>
