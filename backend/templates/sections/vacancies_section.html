{% load static %}

<section class="home-vacancies-section">

    <div class="home-vacancies-container">

        <div class="home-vacancies-media">
            <img
                src="{% static 'images/placeholders/placeholder.png' %}"
                alt=""
            >
        </div>

        <div class="home-vacancies-content">

            <div class="home-vacancies-label">
                Команда
            </div>

            <h2 class="home-vacancies-title">
                Работа в Брауни
            </h2>

            <p class="home-vacancies-text">
                Собираем аккуратную команду для производства, кухни и ежедневной работы с продуктом.
            </p>

            {% if vacancies %}
                <div class="home-vacancies-list">

                    {% for vacancy in vacancies %}
                        <a href="{% url 'vacancies' %}" class="home-vacancy-card">

                            <span class="home-vacancy-name">
                                {{ vacancy.title }}
                            </span>

                            {% if vacancy.salary %}
                                <span class="home-vacancy-salary">
                                    {{ vacancy.salary }}
                                </span>
                            {% endif %}

                        </a>
                    {% endfor %}

                </div>
            {% endif %}

            <a href="{% url 'vacancies' %}" class="home-vacancies-button">
                Смотреть вакансии
            </a>

        </div>

    </div>

</section>
