<div
    class="
        bg-white
        rounded-[32px]
        p-10
        shadow-lg
        transition-all
        duration-300
        hover:-translate-y-2
        hover:shadow-2xl
    "
>

    <div
        class="
            flex
            items-start
            justify-between
            gap-6
        "
    >

        <div>

            <h3
                class="
                    text-3xl
                    font-bold
                    text-primary
                "
            >
                {{ vacancy.title }}
            </h3>

            <p
                class="
                    mt-4
                    text-zinc-600
                    leading-relaxed
                "
            >
                {{ vacancy.short_description }}
            </p>

        </div>

        <div
            class="
                shrink-0
            "
        >

            <span
                class="
                    px-5
                    py-3
                    rounded-full
                    bg-accent
                    text-primary
                    font-semibold
                "
            >
                {{ vacancy.salary }}
            </span>

        </div>

    </div>

</div>
